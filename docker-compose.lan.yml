services:
  backend:
    environment:
      DEBUG: ${LAN_DEBUG:-True}
      ALLOWED_HOSTS: ${LAN_ALLOWED_HOSTS:-localhost,127.0.0.1,${LAN_IP:-localhost}}
      CORS_ALLOWED_ORIGINS: ${LAN_CORS_ALLOWED_ORIGINS:-http://${LAN_IP:-localhost}:8080}
      CSRF_TRUSTED_ORIGINS: ${LAN_CSRF_TRUSTED_ORIGINS:-http://${LAN_IP:-localhost}:8080}
      OTP_AUTH_ENABLED: ${LAN_OTP_AUTH_ENABLED:-True}
      PHONE_ONLY_AUTH_ENABLED: ${LAN_PHONE_ONLY_AUTH_ENABLED:-False}
      ALLOW_GEO_BYPASS: ${LAN_ALLOW_GEO_BYPASS:-True}

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${LAN_NEXT_PUBLIC_API_URL:-http://${LAN_IP:-localhost}:8080}
        NEXT_PUBLIC_DISABLE_GEOLOCATION: ${LAN_NEXT_PUBLIC_DISABLE_GEOLOCATION:-true}
    environment:
      - NEXT_PUBLIC_API_URL=${LAN_NEXT_PUBLIC_API_URL:-http://${LAN_IP:-localhost}:8080}
      - NEXT_PUBLIC_DISABLE_GEOLOCATION=${LAN_NEXT_PUBLIC_DISABLE_GEOLOCATION:-true}

  lan_proxy:
    image: nginx:1.27-alpine
    container_name: baiqymyz_lan_proxy
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "${LAN_PORT:-8080}:80"
    volumes:
      - ./nginx/lan.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
