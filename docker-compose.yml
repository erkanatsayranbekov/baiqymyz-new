services:

  postgres:
    image: postgres:16-alpine
    container_name: drf_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-baiqymyz}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-baiqymyz}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: drf_redis
    restart: unless-stopped
    ports:
      - "6379:6379"  # Удали, если Redis должен быть только внутри
    networks:
      - internal
      
  backend:
    build: ./backend
    container_name: drf_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret-key-change-me}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-baiqymyz.kz,www.baiqymyz.kz,127.0.0.1,localhost}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://baiqymyz.kz,https://www.baiqymyz.kz}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://baiqymyz.kz,https://www.baiqymyz.kz}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DB_NAME: ${DB_NAME:-baiqymyz}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      MOBIZON_API_BASE_URL: ${MOBIZON_API_BASE_URL:-https://api.mobizon.kz}
      MOBIZON_API_KEY: ${MOBIZON_API_KEY:-}
      MOBIZON_SENDER: ${MOBIZON_SENDER:-}
      MOBIZON_TIMEOUT_SECONDS: ${MOBIZON_TIMEOUT_SECONDS:-5}
      OTP_AUTH_ENABLED: ${OTP_AUTH_ENABLED:-False}
      PHONE_ONLY_AUTH_ENABLED: ${PHONE_ONLY_AUTH_ENABLED:-False}
      ALLOW_GEO_BYPASS: ${ALLOW_GEO_BYPASS:-False}
    networks:
      - internal

  celery:
    build: ./backend
    container_name: drf_celery
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret-key-change-me}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-baiqymyz.kz,www.baiqymyz.kz,127.0.0.1,localhost}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://baiqymyz.kz,https://www.baiqymyz.kz}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://baiqymyz.kz,https://www.baiqymyz.kz}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DB_NAME: ${DB_NAME:-baiqymyz}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      MOBIZON_API_BASE_URL: ${MOBIZON_API_BASE_URL:-https://api.mobizon.kz}
      MOBIZON_API_KEY: ${MOBIZON_API_KEY:-}
      MOBIZON_SENDER: ${MOBIZON_SENDER:-}
      MOBIZON_TIMEOUT_SECONDS: ${MOBIZON_TIMEOUT_SECONDS:-5}
      OTP_AUTH_ENABLED: ${OTP_AUTH_ENABLED:-False}
      PHONE_ONLY_AUTH_ENABLED: ${PHONE_ONLY_AUTH_ENABLED:-False}
      ALLOW_GEO_BYPASS: ${ALLOW_GEO_BYPASS:-False}
    command: celery -A baiqymyz_api worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-2} --prefetch-multiplier=${CELERY_PREFETCH_MULTIPLIER:-1}
    networks:
      - internal

  celery_reserve:
    build: ./backend
    container_name: drf_celery_reserve
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret-key-change-me}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-baiqymyz.kz,www.baiqymyz.kz,127.0.0.1,localhost}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://baiqymyz.kz,https://www.baiqymyz.kz}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://baiqymyz.kz,https://www.baiqymyz.kz}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DB_NAME: ${DB_NAME:-baiqymyz}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      MOBIZON_API_BASE_URL: ${MOBIZON_API_BASE_URL:-https://api.mobizon.kz}
      MOBIZON_API_KEY: ${MOBIZON_API_KEY:-}
      MOBIZON_SENDER: ${MOBIZON_SENDER:-}
      MOBIZON_TIMEOUT_SECONDS: ${MOBIZON_TIMEOUT_SECONDS:-5}
      OTP_AUTH_ENABLED: ${OTP_AUTH_ENABLED:-False}
      PHONE_ONLY_AUTH_ENABLED: ${PHONE_ONLY_AUTH_ENABLED:-False}
      ALLOW_GEO_BYPASS: ${ALLOW_GEO_BYPASS:-False}
    command: celery -A baiqymyz_api worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-2} --prefetch-multiplier=${CELERY_PREFETCH_MULTIPLIER:-1}
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_DISABLE_GEOLOCATION: ${NEXT_PUBLIC_DISABLE_GEOLOCATION:-false}
    container_name: t3_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_DISABLE_GEOLOCATION=${NEXT_PUBLIC_DISABLE_GEOLOCATION:-false}
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
